<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f7eaf1" />
    <meta name="description" content="AIイラスト・AI動画制作を一元管理するデスクトップ風クリエイターツール" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Prompt Atelier" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Prompt Atelier</title>
    <link rel="manifest" href="./public/manifest.webmanifest?v=20260707-pa-icon-v51" />
    <link rel="icon" href="./public/icons/prompt-atelier-icon-32.png?v=20260707-pa-icon-v51" type="image/png" />
    <link rel="apple-touch-icon" href="./public/icons/prompt-atelier-icon-192.png?v=20260707-pa-icon-v51" />
    <link rel="stylesheet" href="./src/styles.css?v=20260707-pa-icon-v51" />
  </head>
  <body>
    <div id="root"></div>
    <script src="./public/vendor/react.development.js"></script>
    <script src="./public/vendor/react-dom.development.js"></script>
    <script>
      window.__promptAtelierInstallPrompt = null;
      window.addEventListener("beforeinstallprompt", function (event) {
        event.preventDefault();
        window.__promptAtelierInstallPrompt = event;
        window.dispatchEvent(new Event("promptatelierinstallready"));
      });
    </script>
    <script src="./src/App.compiled.js?v=20260707-pa-icon-v51"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
          navigator.serviceWorker.register("./service-worker.js?v=20260707-pa-icon-v51").catch(function (error) {
            console.warn("[Prompt Atelier] service worker registration failed", error);
          });
        });
      }
    </script>
  </body>
</html>
